---
# Consumed by the infra.aap_configuration.controller_credential_types role.
# Custom credential types keep every secret in AAP — never in git or a vault
# file. Injectors use the !unsafe tag so the {{ field }} reference is written
# verbatim into the credential type and resolved by the Controller at launch,
# not by this CaC run.
controller_credential_types:
  - name: "{{ cred_type_snow }}"
    description: "ServiceNow instance URL + admin login for the Table API."
    kind: cloud
    inputs:
      fields:
        - id: snow_instance
          type: string
          label: ServiceNow Instance URL
        - id: snow_username
          type: string
          label: Username
        - id: snow_password
          type: string
          label: Password
          secret: true
      required:
        - snow_instance
        - snow_username
        - snow_password
    injectors:
      extra_vars:
        snow_instance: !unsafe '{{ snow_instance }}'
        snow_username: !unsafe '{{ snow_username }}'
        snow_password: !unsafe '{{ snow_password }}'

  - name: "{{ cred_type_eda_connection }}"
    description: "EDA controller URL + login for configuring event streams and activations."
    kind: cloud
    inputs:
      fields:
        - id: eda_host
          type: string
          label: EDA Controller URL
        - id: eda_username
          type: string
          label: Username
        - id: eda_password
          type: string
          label: Password
          secret: true
      required:
        - eda_host
        - eda_username
        - eda_password
    injectors:
      extra_vars:
        eda_host: !unsafe '{{ eda_host }}'
        eda_username: !unsafe '{{ eda_username }}'
        eda_password: !unsafe '{{ eda_password }}'

  - name: "{{ cred_type_eda_token }}"
    description: >-
      Shared event-stream token. Injected under two var names so the same
      secret feeds both the ServiceNow side (snow_eda_token) and the EDA side
      (eda_token) from a single credential.
    kind: cloud
    inputs:
      fields:
        - id: eda_event_stream_token
          type: string
          label: Event Stream Token
          secret: true
      required:
        - eda_event_stream_token
    injectors:
      extra_vars:
        snow_eda_token: !unsafe '{{ eda_event_stream_token }}'
        eda_token: !unsafe '{{ eda_event_stream_token }}'
