---
# Consumed by the infra.aap_configuration.controller_credentials role.
# The two credentials the integration needs, created from env-var lookups in
# group_vars/all.yml — no secrets are stored in this file.
controller_credentials:
  - name: "{{ cred_snow }}"
    organization: "{{ my_organization }}"
    credential_type: "{{ cred_type_snow }}"
    inputs:
      snow_instance: "{{ snow_instance }}"
      snow_username: "{{ snow_username }}"
      snow_password: "{{ snow_password }}"

  - name: "{{ cred_eda_connection }}"
    organization: "{{ my_organization }}"
    credential_type: "{{ cred_type_eda_connection }}"
    inputs:
      eda_host: "{{ eda_controller_host }}"
      eda_username: "{{ eda_controller_username }}"
      eda_password: "{{ eda_controller_password }}"

  - name: "{{ cred_eda_token }}"
    organization: "{{ my_organization }}"
    credential_type: "{{ cred_type_eda_token }}"
    inputs:
      eda_event_stream_token: "{{ eda_event_stream_token }}"
